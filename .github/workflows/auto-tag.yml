name: Auto Tag on Merge

on:
  push:
    branches:
      - kernel-backport/main
      - kernel-backport/v6.17

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTOTAG_TOKEN }}

      - name: Check if this is a PR merge
        id: check-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get commit message and SHA
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=%B HEAD)
          echo "Commit SHA: $COMMIT_SHA"
          echo "Commit message: $COMMIT_MSG"
          
          # Check if commit has 2 parents (merge commit)
          if git rev-parse HEAD^2 >/dev/null 2>&1; then
            echo "is_merge=true" >> $GITHUB_OUTPUT
            echo "✅ This is a merge commit (2 parents)"
          # Check commit message for GitHub PR merge patterns
          elif echo "$COMMIT_MSG" | grep -qiE "^Merge pull request #[0-9]+"; then
            echo "is_merge=true" >> $GITHUB_OUTPUT
            echo "✅ This is a GitHub PR merge (from commit message)"
          elif echo "$COMMIT_MSG" | head -1 | grep -qE "\(#[0-9]+\)$"; then
            echo "is_merge=true" >> $GITHUB_OUTPUT
            echo "✅ This is a squash merge (PR number in title)"
          # Check GitHub API if commit is associated with a PR
          elif curl -s -H "Authorization: token $GH_TOKEN" \
                    "https://api.github.com/repos/${{ github.repository }}/commits/$COMMIT_SHA/pulls" \
                    | grep -q '"number"'; then
            echo "is_merge=true" >> $GITHUB_OUTPUT
            echo "✅ This commit is associated with a PR (via GitHub API)"
          else
            echo "is_merge=false" >> $GITHUB_OUTPUT
            echo "❌ This is NOT a PR merge, skipping tag creation"
          fi

      - name: Configure Git
        if: steps.check-merge.outputs.is_merge == 'true'
        run: |
          git config user.name "SYS SEOS AUTOBACKPORT"
          git config user.email "sys_seos_autobackport@intel.com"

      - name: Determine Version Type
        if: steps.check-merge.outputs.is_merge == 'true'
        id: version-type
        run: |
          # All configured branches use kernel-backport versioning with 'v' prefix
          echo "type=kernel-backport" >> $GITHUB_OUTPUT
          echo "prefix=v" >> $GITHUB_OUTPUT

      - name: Extract Kernel Version
        if: steps.check-merge.outputs.is_merge == 'true'
        id: kernel-version
        run: |
          # Extract BASELINE value from config file (e.g., BASELINE=v7.0-rc1)
          if [ -f "config" ]; then
            BASELINE=$(grep "^BASELINE=" config | cut -d'=' -f2)
            echo "Found BASELINE: $BASELINE"
            
            # Remove 'v' prefix but preserve -rcX suffix (e.g., v7.0-rc1 -> 7.0-rc1)
            KERNEL_VERSION=$(echo "$BASELINE" | sed 's/^v//')
            
            echo "kernel_version=$KERNEL_VERSION" >> $GITHUB_OUTPUT
            echo "Detected kernel version from config: $KERNEL_VERSION"
          else
            echo "Error: config file not found"
            exit 1
          fi

      - name: Get Latest Tag and Increment
        if: steps.check-merge.outputs.is_merge == 'true'
        id: increment
        run: |
          PREFIX="${{ steps.version-type.outputs.prefix }}"
          KERNEL_VERSION="${{ steps.kernel-version.outputs.kernel_version }}"
          
          # Kernel Backport versioning: v6.11.9.0, v7.0-rc1.0, etc.
          LATEST_TAG=$(git tag -l "${PREFIX}${KERNEL_VERSION}.*" | sort -V | tail -1)
          
          if [[ -z "$LATEST_TAG" ]]; then
            # First tag for this kernel version
            NEW_TAG="${PREFIX}${KERNEL_VERSION}.0"
            echo "Creating first tag for kernel $KERNEL_VERSION"
          else
            # Extract and increment revision number
            REVISION=$(echo "$LATEST_TAG" | awk -F'.' '{print $NF}')
            NEW_REVISION=$((REVISION + 1))
            NEW_TAG="${PREFIX}${KERNEL_VERSION}.${NEW_REVISION}"
            echo "Incrementing from $LATEST_TAG to $NEW_TAG"
          fi
          
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $NEW_TAG"

      - name: Create and Push Tag
        if: steps.check-merge.outputs.is_merge == 'true'
        env:
          NEW_TAG: ${{ steps.increment.outputs.new_tag }}
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          # Check if tag already exists (safety check)
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists, skipping"
            exit 0
          fi
          
          echo "Creating annotated tag: $NEW_TAG"
          
          # Create annotated tag with detailed message
          git tag -a "$NEW_TAG" \
            -m "Auto-generated tag for $BRANCH_NAME" \
            -m "Commit: $COMMIT_SHA" \
            -m "$COMMIT_MSG"
          
          # Push the tag
          git push origin "$NEW_TAG"
          
          echo "Successfully created and pushed tag: $NEW_TAG"
